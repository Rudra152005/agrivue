

services:
  # Database
  mongodb:
    image: mongo:latest
    container_name: agri-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - agri-network

  # Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../devops/docker/backend/Dockerfile
    container_name: agri-backend
    restart: always
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/agri_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - agri-network

  # Frontend
  frontend:
    build:
      context: ../Frontend
      dockerfile: ../devops/docker/frontend/Dockerfile
    container_name: agri-frontend
    restart: always
    networks:
      - agri-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./docker/nginx
    container_name: agri-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - agri-network

  # Jenkins
  jenkins:
    build:
      context: ./docker/jenkins
    container_name: agri-jenkins
    ports:
      - "18080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agri-network

  # SonarQube
  sonarqube:
    image: sonarqube:lts
    container_name: agri-sonarqube
    ports:
      - "19000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar-data:/opt/sonarqube/data
    networks:
      - agri-network

  # Nexus Repository
  nexus:
    image: sonatype/nexus3:latest
    container_name: agri-nexus
    ports:
      - "18081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - agri-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: agri-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - agri-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: agri-grafana
    ports:
      - "13000:3000"
    networks:
      - agri-network

  # Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: agri-cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - agri-network

networks:
  agri-network:
    driver: bridge

volumes:
  mongo-data:
  jenkins-data:
  sonar-data:
  nexus-data:
